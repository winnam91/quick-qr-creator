    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Do static QR codes expire?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Static QR codes do not expire on their own. They continue to work as long as the linked URL or encoded information remains valid. A website QR code, for example, will keep directing to the same page indefinitely unless the page itself is removed."
          }
        },
        {
          "@type": "Question",
          "name": "Is this QR code generator free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The generator is completely free to use with no usage limits, watermarks, or hidden charges."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need to sign up?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No sign-up is required. You can create, customise, and download QR codes immediately without creating an account."
          }
        },
        {
          "@type": "Question",
          "name": "Is this QR code generator private?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The generator runs entirely client-side in your browser. Your content is not sent to a server, so your data stays on your device."
          }
        },
        {
          "@type": "Question",
          "name": "Can I create a Wi-Fi QR code?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Enter your network name (SSID), password, and security type (WPA/WPA2, WEP, or None). You can also mark the network as hidden. Scanning the QR code lets devices connect without manually typing the password."
          }
        },
        {
          "@type": "Question",
          "name": "Can I create an email or phone QR code?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The generator supports both. Email QR codes can prefill the recipient address, subject, and message body. Phone QR codes trigger a tap-to-call action when scanned."
          }
        },
        {
          "@type": "Question",
          "name": "Can I add a logo to my QR code?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Upload any image as a centre logo. The generator automatically uses the strongest error correction level to keep the code scannable even with a logo covering part of the pattern."
          }
        },
        {
          "@type": "Question",
          "name": "Should I download PNG or SVG?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Choose PNG for quick digital sharing — social media, presentations, documents. Choose SVG when you need the QR code for print materials, packaging, or any use where it will be scaled to a large size."
          }
        }
      ]
    }
